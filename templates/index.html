<link rel="preconnect" href="https://fonts.googleapis.com">

<style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        font-family:'Poppins',sans-serif;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
        overflow:hidden;
        color:white;
    }

    .bg-blur{
        position:absolute;
        width:350px;
        height:350px;
        background:#3b82f6;
        filter:blur(140px);
        opacity:.3;
        border-radius:50%;
        top:-100px;
        left:-100px;
    }

    .bg-blur2{
        position:absolute;
        width:350px;
        height:350px;
        background:#8b5cf6;
        filter:blur(140px);
        opacity:.3;
        border-radius:50%;
        bottom:-100px;
        right:-100px;
    }

    .container{
        position:relative;
        z-index:10;
        width:520px;
        padding:40px;
        border-radius:30px;
        background:rgba(15,23,42,.85);
        backdrop-filter:blur(20px);
        border:1px solid rgba(255,255,255,.08);
        box-shadow:0 20px 50px rgba(0,0,0,.4);
    }

    .logo{
        text-align:center;
        font-size:75px;
        margin-bottom:10px;
    }

    h1{
        text-align:center;
        font-size:40px;
        font-weight:700;
        margin-bottom:10px;
        background:linear-gradient(90deg,#60a5fa,#c084fc);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
    }

    p{
        text-align:center;
        color:#cbd5e1;
        margin-bottom:25px;
    }

    label{
        display:block;
        margin:15px 0 8px;
        font-weight:500;
    }

    select,input{
        width:100%;
        padding:15px;
        border-radius:15px;
        border:1px solid rgba(255,255,255,.1);
        background:rgba(255,255,255,.05);
        color:white;
        font-size:15px;
        outline:none;
    }

    option{
        color:black;
    }

    input::file-selector-button{
        border:none;
        padding:10px 15px;
        border-radius:10px;
        background:#3b82f6;
        color:white;
        cursor:pointer;
    }

    .btn{
        width:100%;
        padding:16px;
        margin-top:20px;
        border:none;
        border-radius:15px;
        background:linear-gradient(90deg,#8b5cf6,#3b82f6);
        color:white;
        font-size:17px;
        font-weight:600;
        cursor:pointer;
        transition:.3s;
    }

    .btn:hover{
        transform:translateY(-3px);
    }

    .features{
        margin-top:30px;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:15px;
    }

    .feature-card{
        background:rgba(255,255,255,.05);
        border:1px solid rgba(255,255,255,.08);
        padding:15px;
        border-radius:15px;
        text-align:center;
        transition:.3s;
    }

    .feature-card:hover{
        transform:translateY(-3px);
        background:rgba(255,255,255,.08);
    }

</style>
```

</head>

<body>

<div class="bg-blur"></div>
<div class="bg-blur2"></div>

<div class="container">

<p>AI-Powered Resume Analyzer & Career Advisor</p>

<form action="/upload" method="POST" enctype="multipart/form-data">

    <label>Select Role</label>

    <select name="role" required>

        <option value="Java Developer">Java Developer</option>
        <option value="Software Engineer">Software Engineer</option>
        <option value="Android Developer">Android Developer</option>
        <option value="Flutter Developer">Flutter Developer</option>
        <option value="Cyber Security Analyst">Cyber Security Analyst</option>
    </select>

    <label>Upload Resume</label>

    <input type="file" name="resume" required>

    <button type="submit" class="btn">
        Analyze Resume 🚀
    </button>

</form>

<div class="features">

    <div class="feature-card">🤖 AI Skill Matching</div>

</div>
